version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: content-manager-app
    restart: unless-stopped
    tty: true
    environment:
      SERVICE_NAME: content-manager-app
      DB_HOST: ${DB_HOST}
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - ./php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - content-manager-network

  webserver:
    image: nginx:alpine
    container_name: content-manager-webserver
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./:/var/www
      - ./nginx/:/etc/nginx/conf.d/
    networks:
      - content-manager-network

  db:
    image: postgres:16-alpine
    container_name: content-manager-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - content-manager-network

  # Redis
  redis:
    image: redis:alpine
    container_name: content-manager-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - content-manager-network

networks:
  content-manager-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local